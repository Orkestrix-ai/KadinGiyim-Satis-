services:
  db:
    image: postgres:16-alpine
    container_name: kadingiyim-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kadingiyim
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: kadingiyim-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:password@db:5432/kadingiyim?schema=public"
      AUTH_SECRET: "your-secret-key-change-in-production"
      AUTH_URL: "http://localhost:3001"
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      FACEBOOK_CLIENT_ID: ""
      FACEBOOK_CLIENT_SECRET: ""
      RESEND_API_KEY: ""
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
